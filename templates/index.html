<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container">

        <h1>📝 To-Do List App</h1>

        <form>
            <input
                type="text"
                placeholder="Enter a task..."
                required
            >

            <button type="submit">
                Add Task
            </button>
        </form>

        <div class="tasks">

            <p>No Tasks Yet</p>

        </div>

    </div>

</body>
</html>
