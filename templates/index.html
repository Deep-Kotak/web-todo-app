<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1>📝 To-Do List App</h1>

    <form method="POST">

        <input
            type="text"
            name="task"
            placeholder="Enter a task..."
            required
        >

        <button type="submit">
            Add Task
        </button>

    </form>

    <div class="tasks">

        {% for task in tasks %}

           <div class="task-item">

    <span>
        {{ task[1] }}
    </span>

    <a href="/delete/{{ task[0] }}">
        Delete
    </a>

</div>

        {% endfor %}

    </div>

</div>

</body>
</html>
